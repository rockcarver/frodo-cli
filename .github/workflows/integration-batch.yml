name: Integration Batch

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, do not push integration branch, edit PR labels/comments, or create/update integration PR."
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: integration-batch
  cancel-in-progress: false

jobs:
  build-integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve dry-run flag
        id: dryrun
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"
          echo "Dry run: $DRY_RUN"

      - name: Select open integration-batch PRs
        id: candidates
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prs_json="$(gh pr list --state open --label integration-batch --json number,isDraft,title,labels --jq '
            map(
              select(.isDraft == false)
              | select((.labels | map(.name) | index("integrated")) | not)
            )
            | sort_by(.number)
          ')"
          echo "prs_json=$(echo "$prs_json" | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "candidate_count=$(echo "$prs_json" | jq 'length')" >> "$GITHUB_OUTPUT"

      - name: Filter to successful check runs
        id: selected
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          prs_json='${{ steps.candidates.outputs.prs_json }}'

          selected='[]'
          skipped='[]'

          for pr in $(echo "$prs_json" | jq -r '.[].number'); do
            head_sha="$(gh pr view "$pr" --repo "$REPO" --json headRefOid --jq .headRefOid)"
            checks_json="$(gh api -H "Accept: application/vnd.github+json" "/repos/$REPO/commits/$head_sha/check-runs")"
            title="$(echo "$prs_json" | jq -r ".[] | select(.number==$pr) | .title")"

            total_count="$(echo "$checks_json" | jq -r '.total_count')"
            pending_count="$(echo "$checks_json" | jq '[.check_runs // [] | .[] | select(.status != "completed")] | length')"
            bad_conclusion_count="$(echo "$checks_json" | jq '[.check_runs // [] | .[] | select(.status == "completed" and .conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral")] | length')"

            if [ "$total_count" -eq 0 ]; then
              skipped="$(echo "$skipped" | jq --argjson n "$pr" --arg t "$title" '. + [{"number":$n,"title":$t,"reason":"no check runs found"}]')"
            elif [ "$pending_count" -gt 0 ]; then
              skipped="$(echo "$skipped" | jq --argjson n "$pr" --arg t "$title" '. + [{"number":$n,"title":$t,"reason":"checks pending"}]')"
            elif [ "$bad_conclusion_count" -gt 0 ]; then
              skipped="$(echo "$skipped" | jq --argjson n "$pr" --arg t "$title" '. + [{"number":$n,"title":$t,"reason":"checks not successful"}]')"
            else
              selected="$(echo "$selected" | jq --argjson n "$pr" --arg t "$title" '. + [{"number":$n,"title":$t}]')"
            fi
          done

          echo "selected=$(echo "$selected" | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "skipped=$(echo "$skipped" | jq -c .)" >> "$GITHUB_OUTPUT"

      - name: Reset integration branch to main
        run: |
          git fetch origin main
          git checkout -B integration origin/main

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Merge selected PRs
        id: merge
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          selected='${{ steps.selected.outputs.selected }}'
          dry_run='${{ steps.dryrun.outputs.dry_run }}'
          output_file="$(mktemp)"
          ./.github/integration/scripts/merge_prs.sh \
            --prs-json "$selected" \
            --dry-run "$dry_run" \
            --repo "$REPO" > "$output_file"
          summary="$(awk 'NF { line = $0 } END { print line }' "$output_file")"
          rm -f "$output_file"

          if [ -z "$summary" ]; then
            echo "merge_prs.sh did not emit a JSON summary on stdout" >&2
            exit 1
          fi

          summary="$(echo "$summary" | jq -c .)"

          echo "summary=$summary" >> "$GITHUB_OUTPUT"
          echo "merged=$(echo "$summary" | jq -c '.merged')" >> "$GITHUB_OUTPUT"
          echo "merge_skipped=$(echo "$summary" | jq -c '.skipped')" >> "$GITHUB_OUTPUT"
          echo "auto_resolved_conflicts=$(echo "$summary" | jq -c '.auto_resolved_conflicts')" >> "$GITHUB_OUTPUT"
          echo "snapshot_updates=$(echo "$summary" | jq -c '.snapshot_updates')" >> "$GITHUB_OUTPUT"
          echo "lockfile_regeneration=$(echo "$summary" | jq -c '.lockfile_regeneration')" >> "$GITHUB_OUTPUT"

      - name: Apply labels and comments
        if: ${{ steps.dryrun.outputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          merged='${{ steps.merge.outputs.merged }}'
          merge_skipped='${{ steps.merge.outputs.merge_skipped }}'

          for pr in $(echo "$merged" | jq -r '.[].number'); do
            gh pr edit "$pr" --repo "$REPO" \
              --remove-label integration-batch \
              --remove-label integration-failed \
              --add-label integrated || true
            gh pr comment "$pr" --repo "$REPO" --body "Included in \`integration\` branch by automation.\n\nRun: $RUN_URL" || true
          done

          for pr in $(echo "$merge_skipped" | jq -r '.[].number'); do
            reason="$(echo "$merge_skipped" | jq -r ".[] | select(.number==$pr) | .reason")"
            gh pr edit "$pr" --repo "$REPO" \
              --remove-label integration-batch \
              --add-label integration-failed || true
            gh pr comment "$pr" --repo "$REPO" --body "Skipped from automated \`integration\` batch due to: $reason. Please rebase against \`main\`, resolve conflicts, and re-add label \`integration-batch\`.\n\nRun: $RUN_URL" || true
          done

      - name: Bump @rockcarver/frodo-lib to @next
        run: |
          npm install @rockcarver/frodo-lib@next --save-exact
          npm ci

          if ! git diff --quiet; then
            git add package.json package-lock.json
            git commit -m "chore: bump @rockcarver/frodo-lib to @next"
          else
            echo "No dependency changes detected."
          fi

      - name: Push integration branch
        id: push_integration
        if: ${{ steps.dryrun.outputs.dry_run != 'true' }}
        run: |
          git push origin integration --force-with-lease

      - name: Full test suite on integration branch
        id: integration_full_tests
        if: ${{ steps.dryrun.outputs.dry_run != 'true' }}
        run: |
          npm ci
          npm run build:only
          npm i -g
          npm_global_bin="$(npm bin -g 2>/dev/null || true)"
          if [ -z "$npm_global_bin" ]; then
            npm_global_bin="$(npm prefix -g)/bin"
          fi
          if [ -z "$npm_global_bin" ]; then
            echo "Unable to resolve npm global bin path" >&2
            exit 1
          fi
          echo "$npm_global_bin" >> "$GITHUB_PATH"
          export PATH="$npm_global_bin:$PATH"
          npm test

      - name: Create or update PR integration -> main
        id: integration_pr
        if: ${{ steps.dryrun.outputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          merged='${{ steps.merge.outputs.merged }}'
          skipped_checks='${{ steps.selected.outputs.skipped }}'
          skipped_merge='${{ steps.merge.outputs.merge_skipped }}'
          auto_resolved='${{ steps.merge.outputs.auto_resolved_conflicts }}'
          snapshot_updates='${{ steps.merge.outputs.snapshot_updates }}'
          lockfile_regeneration='${{ steps.merge.outputs.lockfile_regeneration }}'

          included_list="$(echo "$merged" | jq -r '.[] | "- #\(.number): \(.title)"')"
          skipped_checks_list="$(echo "$skipped_checks" | jq -r '.[] | "- #\(.number): \(.title) (\(.reason))"')"
          skipped_merge_list="$(echo "$skipped_merge" | jq -r '.[] | "- #\(.number): \(.title) (\(.reason))"')"
          auto_union_list="$(echo "$auto_resolved" | jq -r '.[] | select(.type=="union") | "- #\(.number): \(.title)"')"
          auto_snapshot_list="$(echo "$auto_resolved" | jq -r '.[] | select(.type=="snapshot") | "- #\(.number): \(.title)"')"
          auto_lockfile_list="$(echo "$lockfile_regeneration" | jq -r '.prs[]? | "- #\(.number): \(.title)"')"
          snapshot_patterns_list="$(echo "$snapshot_updates" | jq -r '.patterns[]? | "- \(.)"')"
          snapshot_files_list="$(echo "$snapshot_updates" | jq -r '.files[]? | "- \(.)"')"
          lockfile_regen_list="$(echo "$lockfile_regeneration" | jq -r '.prs[]? | "- #\(.number): \(.title)\(if .updated then " (updated package-lock.json)" else " (no lockfile diff)" end)"')"

          body=$'This PR is auto-generated from PRs labeled `integration-batch`.\n\n'
          body+=$'## Included\n'
          body+="${included_list:-"- (none)"}"
          body+=$'\n\n## Skipped (checks)\n'
          body+="${skipped_checks_list:-"- (none)"}"
          body+=$'\n\n## Skipped (merge conflicts)\n'
          body+="${skipped_merge_list:-"- (none)"}"
          body+=$'\n\n## Auto-resolved conflicts (union)\n'
          body+="${auto_union_list:-"- (none)"}"
          body+=$'\n\n## Auto-resolved conflicts (snapshots)\n'
          body+="${auto_snapshot_list:-"- (none)"}"
          body+=$'\n\n## Auto-resolved conflicts (package-lock.json)\n'
          body+="${auto_lockfile_list:-"- (none)"}"
          body+=$'\n\n## Snapshot update patterns run\n'
          body+="${snapshot_patterns_list:-"- (none)"}"
          body+=$'\n\n## Snapshot files updated\n'
          body+="${snapshot_files_list:-"- (none)"}"
          body+=$'\n\n## package-lock.json regeneration\n'
          body+="Attempted: $(echo "$lockfile_regeneration" | jq -r '.attempted')"
          body+=$'\n'
          body+="Updated: $(echo "$lockfile_regeneration" | jq -r '.updated')"
          body+=$'\n'
          body+="${lockfile_regen_list:-"- (none)"}"
          body+=$'\n\nAlso bumps `@rockcarver/frodo-lib` to `@next`.\n'

          existing="$(gh pr list --repo "$REPO" --state open --head integration --base main --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --repo "$REPO" --title "integration" --body "$body"
            integration_pr_number="$existing"
          else
            created_pr_url="$(gh pr create --repo "$REPO" --head integration --base main --title "integration" --body "$body")"
            integration_pr_number="$(gh pr view "$created_pr_url" --repo "$REPO" --json number --jq '.number')"
          fi

          if [ -z "$integration_pr_number" ]; then
            echo "Failed to determine integration PR number" >&2
            exit 1
          fi
          echo "number=$integration_pr_number" >> "$GITHUB_OUTPUT"

      - name: Label integration PR for snapshot review
        if: ${{ steps.dryrun.outputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          snapshot_updates='${{ steps.merge.outputs.snapshot_updates }}'
          integration_pr_number='${{ steps.integration_pr.outputs.number }}'
          snapshot_file_count="$(echo "$snapshot_updates" | jq -r '(.files // []) | length' 2>/dev/null || echo 0)"

          if [ "$snapshot_file_count" -gt 0 ]; then
            gh pr edit "$integration_pr_number" --repo "$REPO" --add-label integration-needs-snapshot-review || true
          fi

      - name: Job summary
        if: always()
        run: |
          echo "### Integration batch results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Dry run:** ${{ steps.dryrun.outputs.dry_run }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ '${{ steps.dryrun.outputs.dry_run }}' = 'true' ]; then
            echo "**Integration branch push:** skipped (dry run)" >> "$GITHUB_STEP_SUMMARY"
            echo "**Full test suite on integration:** skipped (dry run)" >> "$GITHUB_STEP_SUMMARY"
          else
            case '${{ steps.push_integration.outcome }}' in
              success) push_status='pushed' ;;
              failure) push_status='failed' ;;
              skipped) push_status='skipped' ;;
              *) push_status='unknown' ;;
            esac
            case '${{ steps.integration_full_tests.outcome }}' in
              success) test_status='passed' ;;
              failure) test_status='failed' ;;
              skipped) test_status='skipped' ;;
              *) test_status='unknown' ;;
            esac
            echo "**Integration branch push:** $push_status" >> "$GITHUB_STEP_SUMMARY"
            echo "**Full test suite on integration:** $test_status" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "**Merged into integration:**" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.merge.outputs.merged }}' | jq -r '.[] | "- #\(.number): \(.title)"' >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "**Skipped (checks):**" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.selected.outputs.skipped }}' | jq -r '.[] | "- #\(.number): \(.title) (\(.reason))"' >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "**Skipped (merge conflicts):**" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.merge.outputs.merge_skipped }}' | jq -r '.[] | "- #\(.number): \(.title) (\(.reason))"' >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "**Auto-resolved conflicts (union):**" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.merge.outputs.auto_resolved_conflicts }}' | jq -r '.[] | select(.type=="union") | "- #\(.number): \(.title)"' >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "**Auto-resolved conflicts (snapshots):**" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.merge.outputs.auto_resolved_conflicts }}' | jq -r '.[] | select(.type=="snapshot") | "- #\(.number): \(.title)"' >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "**Auto-resolved conflicts (package-lock.json):**" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.merge.outputs.lockfile_regeneration }}' | jq -r '.prs[]? | "- #\(.number): \(.title)"' >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "**Snapshot update patterns run:**" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.merge.outputs.snapshot_updates }}' | jq -r '.patterns[]? | "- \(.)"' >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "**Snapshot files updated:**" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.merge.outputs.snapshot_updates }}' | jq -r '.files[]? | "- \(.)"' >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "**package-lock.json regeneration:**" >> "$GITHUB_STEP_SUMMARY"
          echo "Attempted: $(echo '${{ steps.merge.outputs.lockfile_regeneration }}' | jq -r '.attempted')" >> "$GITHUB_STEP_SUMMARY"
          echo "Updated: $(echo '${{ steps.merge.outputs.lockfile_regeneration }}' | jq -r '.updated')" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.merge.outputs.lockfile_regeneration }}' | jq -r '.prs[]? | "- #\(.number): \(.title)\(if .updated then " (updated package-lock.json)" else " (no lockfile diff)" end)"' >> "$GITHUB_STEP_SUMMARY" || true
